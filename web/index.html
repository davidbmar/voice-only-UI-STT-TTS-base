<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Base</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 16px 24px;
    border-bottom: 1px solid #1a1a2e;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
    color: #fff;
  }
  #status {
    font-size: 13px;
    color: #666;
    margin-left: auto;
  }
  #status.connected { color: #4ade80; }
  #status.calling { color: #facc15; }
  #status.error { color: #f87171; }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .msg {
    max-width: 75%;
    padding: 10px 16px;
    border-radius: 16px;
    font-size: 15px;
    line-height: 1.5;
    word-wrap: break-word;
  }
  .msg.user {
    align-self: flex-end;
    background: #2563eb;
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.assistant {
    align-self: flex-start;
    background: #1e1e2e;
    color: #e0e0e0;
    border-bottom-left-radius: 4px;
  }
  .msg.status-msg {
    align-self: center;
    background: transparent;
    color: #666;
    font-size: 13px;
    padding: 4px;
  }

  footer {
    padding: 20px 24px;
    border-top: 1px solid #1a1a2e;
    display: flex;
    justify-content: center;
  }

  #call-btn {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: none;
    background: #22c55e;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #call-btn:hover { background: #16a34a; transform: scale(1.05); }
  #call-btn:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; }
  #call-btn.hangup { background: #ef4444; }
  #call-btn.hangup:hover { background: #dc2626; }

  /* Phone icon using CSS */
  .phone-icon {
    width: 24px;
    height: 24px;
  }

  /* Loading overlay */
  #loading-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    transition: opacity 0.5s ease;
  }
  #loading-overlay.fade-out {
    opacity: 0;
    pointer-events: none;
  }
  #loading-overlay h1 {
    font-size: 24px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.5px;
  }
  .load-items {
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-width: 280px;
  }
  .load-item {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 14px;
    color: #888;
  }
  .load-item .indicator {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    background: #333;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .load-item.loading .indicator {
    background: #facc15;
    animation: pulse-load 1s infinite;
  }
  .load-item.ready .indicator {
    background: #4ade80;
    box-shadow: 0 0 8px rgba(74, 222, 128, 0.4);
  }
  .load-item.ready { color: #4ade80; }
  .load-item.loading { color: #facc15; }
  .load-item .label { flex: 1; }
  @keyframes pulse-load {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  #loading-hint {
    font-size: 12px;
    color: #444;
    transition: opacity 0.3s;
  }
</style>
</head>
<body>

<div id="loading-overlay">
  <h1>Voice Base</h1>
  <div class="load-items">
    <div class="load-item" id="load-stt">
      <span class="indicator"></span>
      <span class="label">STT Model — waiting</span>
    </div>
    <div class="load-item" id="load-tts">
      <span class="indicator"></span>
      <span class="label">TTS Voice — waiting</span>
    </div>
  </div>
  <div id="loading-hint">Models load on first launch. This may take a minute.</div>
</div>

<header>
  <h1>Voice Base</h1>
  <a href="/admin" style="font-size:13px; color:#7a7a9a; text-decoration:none; transition:color 0.2s;" onmouseover="this.style.color='#e0e0e0'" onmouseout="this.style.color='#7a7a9a'">Admin</a>
  <span id="status">Connecting...</span>
</header>

<div id="chat"></div>

<footer>
  <button id="call-btn" disabled>Call</button>
</footer>

<script>
(function() {
  "use strict";

  const statusEl = document.getElementById("status");
  const callBtn = document.getElementById("call-btn");
  const chatEl = document.getElementById("chat");

  let ws = null;
  let pc = null;
  let localStream = null;
  let iceServers = [];
  let inCall = false;

  function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.textContent = text;
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function setStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className = cls || "";
  }

  function updateStatusMessage(text) {
    // Update or create a status message at the bottom of chat
    let existing = chatEl.querySelector(".msg.status-msg:last-child");
    if (existing && existing === chatEl.lastElementChild) {
      existing.textContent = text;
    } else {
      addMessage(text, "status-msg");
    }
  }

  // ── WebSocket ──────────────────────────────────────
  function connectSignaling() {
    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    const url = proto + "//" + location.host + "/ws";

    ws = new WebSocket(url);

    ws.onopen = function() {
      setStatus("Connected", "connected");
      ws.send(JSON.stringify({ type: "hello" }));
    };

    ws.onmessage = function(event) {
      let msg;
      try { msg = JSON.parse(event.data); } catch(e) { return; }

      switch (msg.type) {
        case "hello_ack":
          iceServers = msg.ice_servers || [];
          callBtn.disabled = false;
          setStatus("Ready", "connected");
          break;

        case "webrtc_answer":
          handleAnswer(msg.sdp);
          break;

        case "transcript":
          // Remove status message before adding transcript
          removeLastStatus();
          addMessage(msg.text, "user");
          break;

        case "response":
          removeLastStatus();
          addMessage(msg.text, "assistant");
          break;

        case "status":
          updateStatusMessage(msg.text);
          break;

        case "error":
          setStatus("Error: " + msg.message, "error");
          if (inCall) cleanupCall();
          break;

        case "pong":
          break;
      }
    };

    ws.onclose = function() {
      setStatus("Disconnected");
      callBtn.disabled = true;
      ws = null;
      if (inCall) hangUp();
      // Reconnect after 3s
      setTimeout(connectSignaling, 3000);
    };

    ws.onerror = function() {
      setStatus("Connection error", "error");
    };
  }

  function removeLastStatus() {
    const last = chatEl.querySelector(".msg.status-msg:last-child");
    if (last && last === chatEl.lastElementChild) {
      last.remove();
    }
  }

  // ── WebRTC ─────────────────────────────────────────
  async function startCall() {
    if (inCall) return;

    setStatus("Requesting mic...", "calling");

    try {
      localStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true,
          sampleRate: 48000,
        },
        video: false,
      });
    } catch(err) {
      setStatus("Mic access denied", "error");
      return;
    }

    const rtcConfig = { iceServers: [] };
    for (const s of iceServers) {
      const entry = { urls: s.urls || s.url || "" };
      if (s.username) entry.username = s.username;
      if (s.credential) entry.credential = s.credential;
      rtcConfig.iceServers.push(entry);
    }

    pc = new RTCPeerConnection(rtcConfig);

    for (const track of localStream.getTracks()) {
      pc.addTrack(track, localStream);
    }

    pc.ontrack = function(event) {
      const audio = document.createElement("audio");
      audio.autoplay = true;
      audio.playsInline = true;
      audio.srcObject = event.streams[0] || new MediaStream([event.track]);
      document.body.appendChild(audio);
    };

    pc.oniceconnectionstatechange = function() {
      if (pc.iceConnectionState === "connected") {
        setStatus("In call", "connected");
      } else if (pc.iceConnectionState === "disconnected" || pc.iceConnectionState === "failed") {
        setStatus("Call ended", "error");
        hangUp();
      }
    };

    try {
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      setStatus("Connecting...", "calling");

      await new Promise(function(resolve) {
        if (pc.iceGatheringState === "complete") { resolve(); return; }
        const timer = setTimeout(function() { resolve(); }, 10000);
        pc.onicegatheringstatechange = function() {
          if (pc.iceGatheringState === "complete") {
            clearTimeout(timer);
            resolve();
          }
        };
      });

      ws.send(JSON.stringify({
        type: "webrtc_offer",
        sdp: pc.localDescription.sdp,
      }));

      inCall = true;
      callBtn.textContent = "End";
      callBtn.classList.add("hangup");
    } catch(err) {
      setStatus("Call failed", "error");
      cleanupCall();
    }
  }

  async function handleAnswer(sdp) {
    if (!pc) return;
    try {
      await pc.setRemoteDescription(new RTCSessionDescription({ type: "answer", sdp: sdp }));
    } catch(err) {
      console.error("Failed to set answer:", err);
    }
  }

  function hangUp() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: "hangup" }));
    }
    cleanupCall();
    setStatus("Ready", "connected");
  }

  function cleanupCall() {
    inCall = false;
    callBtn.textContent = "Call";
    callBtn.classList.remove("hangup");

    if (pc) { pc.close(); pc = null; }
    if (localStream) {
      for (const t of localStream.getTracks()) t.stop();
      localStream = null;
    }
  }

  callBtn.addEventListener("click", function() {
    if (inCall) hangUp(); else startCall();
  });

  setInterval(function() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: "ping" }));
    }
  }, 30000);

  window.addEventListener("beforeunload", function() {
    if (inCall && ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: "hangup" }));
    }
  });

  // ── Loading overlay / preload polling ─────────
  (function pollPreload() {
    var overlay = document.getElementById("loading-overlay");
    var sttEl = document.getElementById("load-stt");
    var ttsEl = document.getElementById("load-tts");
    var hint = document.getElementById("loading-hint");
    var startTime = Date.now();
    var dismissed = false;

    function updateItem(el, status, modelName) {
      var label = el.querySelector(".label");
      if (status === "ready") {
        el.className = "load-item ready";
        label.textContent = modelName + " — ready";
      } else if (status === "loading") {
        el.className = "load-item loading";
        label.textContent = modelName + " — loading...";
      } else {
        el.className = "load-item";
        label.textContent = modelName + " — waiting";
      }
    }

    function poll() {
      if (dismissed) return;
      fetch("/api/config")
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var ms = data.model_status || {};

          var sttName = "STT Model (" + (ms.stt_model || "base") + ")";
          var ttsName = "TTS Voice (" + (ms.tts_voice || "default") + ")";

          updateItem(sttEl, ms.stt, sttName);
          updateItem(ttsEl, ms.tts, ttsName);

          if (Date.now() - startTime > 30000) {
            hint.textContent = "Still loading — large models can take a while on first download.";
          }

          if (ms.stt === "ready" && ms.tts === "ready") {
            dismissed = true;
            setTimeout(function() {
              overlay.classList.add("fade-out");
              setTimeout(function() { overlay.remove(); }, 600);
            }, 400);
          } else {
            setTimeout(poll, 500);
          }
        })
        .catch(function() {
          setTimeout(poll, 1000);
        });
    }

    poll();
  })();

  connectSignaling();
})();
</script>
</body>
</html>
